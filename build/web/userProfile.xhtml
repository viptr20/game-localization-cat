<!DOCTYPE html>
<f:view xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:p="http://primefaces.org/ui"
        locale="#{localeBean.currentLocale}">

    <html lang="#{localeBean.currentLocale.language}"
          dir="#{localeBean.rtl ? 'rtl' : 'ltr'}">

    <h:head>
        <title>#{msg['profile.title']}</title>
        <h:outputStylesheet library="css" name="layout.css" />
    </h:head>

    <h:body styleClass="#{localeBean.rtl ? 'rtl-layout' : 'ltr-layout'}">
        <h:form id="profileForm">
            <p:panel header="#{msg['profile.header']}" style="max-width:600px;margin:2rem auto;">

                <p:toolbar style="margin-bottom:1rem;">
                    <p:toolbarGroup align="right">
                        <p:selectOneMenu id="localeMenu"
                                         value="#{localeBean.language}"
                                         style="min-width:170px;">
                            <f:selectItem itemValue="bg" itemLabel="#{msg['lang.bg']}" />
                            <f:selectItem itemValue="en" itemLabel="#{msg['lang.en']}" />
                            <f:selectItem itemValue="pt" itemLabel="#{msg['lang.pt']}" />
                            <f:selectItem itemValue="ar" itemLabel="#{msg['lang.ar']}" />
                            <f:selectItem itemValue="hy" itemLabel="#{msg['lang.hy']}" />
                            <p:ajax listener="#{localeBean.changeLanguage}" update="@all" />
                        </p:selectOneMenu>
                    </p:toolbarGroup>
                </p:toolbar>

                <p:messages id="messages" showDetail="true" closable="true" />

                <h:panelGrid columns="2"
                             columnClasses="label,value"
                             styleClass="ui-fluid">

                    <h:outputText value="#{msg['profile.username']}" />
                    <h:outputText value="#{userProfileBean.user != null ? userProfileBean.user.username : ''}" />

                    <h:outputText value="#{msg['profile.fullName']}" />
                    <h:outputText value="#{userProfileBean.user != null ? userProfileBean.user.fullName : ''}" />

                    <h:outputText value="#{msg['profile.role']}" />
                    <h:outputText value="#{userProfileBean.user != null ? userProfileBean.user.role : ''}" />
                </h:panelGrid>

                <br/>

                <p:commandButton value="#{msg['button.backToDashboard']}"
                                 action="back"
                                 process="@this"
                                 ajax="false"
                                 icon="ui-icon-arrowreturnthick-1-w" />
            </p:panel>
        </h:form>
    </h:body>
    </html>
</f:view>
