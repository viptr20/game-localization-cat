<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Projects</title>
    <h:outputStylesheet library="css" name="layout.css" />
</h:head>

<h:body styleClass="ltr-layout">
    <div class="page-shell">

        <p:growl id="growl" showDetail="true" life="3000" />

        <p:panel header="Projects" styleClass="page-section">

            <h:form id="projectsUploadForm" enctype="multipart/form-data" styleClass="page-section">
                <p:panel header="Import Projects">
                    <div class="import-stack">

                        <div class="import-row">
                            <div class="import-label">CSV</div>
                            <div class="import-picker">
                                <p:fileUpload value="#{projectsBean.projectsCsvFile}"
                                              mode="simple"
                                              skinSimple="true"
                                              allowTypes="/(\.|\/)(csv)$/"
                                              label="Choose CSV" />
                            </div>
                            <div class="import-action">
                                <p:commandButton value="Import CSV"
                                                 action="#{projectsBean.uploadProjectsCsv}"
                                                 process="@form"
                                                 update=":projectsMainForm:projectsTable :growl"
                                                 icon="pi pi-upload" />
                            </div>
                        </div>

                        <div class="import-row">
                            <div class="import-label">XLSX</div>
                            <div class="import-picker">
                                <p:fileUpload value="#{projectsBean.projectsXlsxFile}"
                                              mode="simple"
                                              skinSimple="true"
                                              allowTypes="/(\.|\/)(xlsx)$/"
                                              label="Choose XLSX" />
                            </div>
                            <div class="import-action">
                                <p:commandButton value="Import XLSX"
                                                 action="#{projectsBean.uploadProjectsXlsx}"
                                                 process="@form"
                                                 update=":projectsMainForm:projectsTable :growl"
                                                 icon="pi pi-upload"
                                                 styleClass="ui-button-secondary" />
                            </div>
                        </div>

                    </div>
                </p:panel>
            </h:form>

            <h:form id="projectsMainForm">
                <p:toolbar style="margin-bottom:1rem;">

                    <p:toolbarGroup>
                        <p:commandButton value="Export Selected CSV"
                                         action="#{projectsBean.downloadSelectedProjectsCsv}"
                                         ajax="false"
                                         process="@form"
                                         icon="pi pi-download" />

                        <p:commandButton value="Export All CSV"
                                         action="#{projectsBean.downloadAllProjectsCsv}"
                                         ajax="false"
                                         process="@this"
                                         icon="pi pi-download"
                                         styleClass="ui-button-secondary" />

                        <p:commandButton value="Export Selected XLSX"
                                         action="#{projectsBean.downloadSelectedProjectsXlsx}"
                                         ajax="false"
                                         process="@form"
                                         icon="pi pi-file-excel" />

                        <p:commandButton value="Export All XLSX"
                                         action="#{projectsBean.downloadAllProjectsXlsx}"
                                         ajax="false"
                                         process="@this"
                                         icon="pi pi-file-excel"
                                         styleClass="ui-button-secondary" />
                    </p:toolbarGroup>

                    <p:toolbarGroup align="right">
                        <p:button value="Back"
                                  outcome="/dashboard.xhtml"
                                  icon="pi pi-arrow-left"
                                  styleClass="ui-button-secondary" />
                    </p:toolbarGroup>

                </p:toolbar>

                <p:dataTable id="projectsTable"
                             value="#{projectsBean.projects}"
                             var="p"
                             rowKey="#{p.id}"
                             selection="#{projectsBean.selectedProjects}"
                             paginator="true"
                             rows="10"
                             reflow="true"
                             style="width:100%;">

                    <p:column selectionMode="multiple" style="width:3rem; text-align:center;" />

                    <p:column headerText="ID">
                        <h:outputText value="#{p.id}" />
                    </p:column>

                    <p:column headerText="Name">
                        <h:outputText value="#{p.name}" />
                    </p:column>

                    <p:column headerText="Source">
                        <h:outputText value="#{p.sourceLang}" />
                    </p:column>

                    <p:column headerText="Targets">
                        <h:outputText value="#{p.targetLangs}" />
                    </p:column>

                    <p:column headerText="Status">
                        <h:outputText value="#{p.status}" />
                    </p:column>

                    <p:column headerText="Actions">
                        <h:link outcome="/projectDetails.xhtml" value="Details">
                            <f:param name="projectId" value="#{p.id}" />
                        </h:link>
                    </p:column>

                </p:dataTable>
            </h:form>

        </p:panel>
    </div>
</h:body>
</html>
