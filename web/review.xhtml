<!DOCTYPE html>
<f:view xmlns="http://www.w3.org/1999/xhtml"
        xmlns:h="http://xmlns.jcp.org/jsf/html"
        xmlns:f="http://xmlns.jcp.org/jsf/core"
        xmlns:p="http://primefaces.org/ui"
        locale="#{localeBean.currentLocale}">

    <f:metadata>
        <f:viewParam name="projectId" value="#{reviewBean.projectId}" />
        <f:event type="preRenderView" listener="#{reviewBean.init}" />
    </f:metadata>

    <html lang="#{localeBean.currentLocale.language}"
          dir="#{localeBean.rtl ? 'rtl' : 'ltr'}">

    <h:head>
        <title>#{msg['review.title']}</title>
        <h:outputStylesheet library="css" name="layout.css" />
    </h:head>

    <h:body styleClass="#{localeBean.rtl ? 'rtl-layout' : 'ltr-layout'}">
        <h:form id="reviewForm">
            <p:panel header="#{msg['review.header']}"
                     style="margin:1rem;"
                     styleClass="review-panel">

                <p:toolbar style="margin-bottom:1rem;">
                    <p:toolbarGroup align="right">
                        <p:selectOneMenu id="localeMenu"
                                         value="#{localeBean.language}"
                                         style="min-width:170px;">
                            <f:selectItem itemValue="bg" itemLabel="#{msg['lang.bg']}" />
                            <f:selectItem itemValue="en" itemLabel="#{msg['lang.en']}" />
                            <f:selectItem itemValue="pt" itemLabel="#{msg['lang.pt']}" />
                            <f:selectItem itemValue="ar" itemLabel="#{msg['lang.ar']}" />
                            <f:selectItem itemValue="hy" itemLabel="#{msg['lang.hy']}" />
                            <f:selectItem itemValue="he" itemLabel="#{msg['lang.he']}" />
                        </p:selectOneMenu>

                        <p:spacer width="10" />

                        <p:commandButton value="#{msg['button.applyLanguage']}"
                                         action="#{localeBean.applyLanguage}"
                                         process="@form"
                                         ajax="false"
                                         icon="pi pi-refresh"
                                         styleClass="ui-button-secondary" />
                    </p:toolbarGroup>
                </p:toolbar>

                <p:messages id="messages" showDetail="true" closable="true" />

                <h:outputText value="#{msg['review.projectId']} #{reviewBean.projectId}" />
                <br /><br />

                <p:dataTable value="#{reviewBean.segments}"
                             var="seg"
                             paginator="true"
                             rows="10"
                             style="width:100%;">

                    <p:column headerText="#{msg['column.id']}">
                        <h:outputText value="#{seg.id}" />
                    </p:column>

                    <p:column headerText="#{msg['column.source']}">
                        <h:outputText value="#{seg.sourceText}" />
                    </p:column>

                    <p:column headerText="#{msg['column.target']}">
                        <h:outputText value="#{seg.targetText}" />
                    </p:column>

                    <!-- Status column with constrained width -->
                    <p:column headerText="#{msg['column.status']}" style="width:8rem;">
                        <p:selectOneMenu value="#{seg.status}"
                                         style="width:100%; max-width:7rem;">
                            <f:selectItem itemValue="NEW" itemLabel="#{msg['status.new']}" />
                            <f:selectItem itemValue="IN_PROGRESS" itemLabel="#{msg['status.inProgress']}" />
                            <f:selectItem itemValue="DONE" itemLabel="#{msg['status.done']}" />
                        </p:selectOneMenu>
                    </p:column>

                </p:dataTable>

                <br />

                <p:commandButton value="#{msg['button.saveReview']}"
                                 action="#{reviewBean.save}"
                                 process="@form"
                                 update="@form"
                                 icon="pi pi-save" />

                <p:spacer width="10" />

                <!-- Back – оставен както е, щом работи -->
                <p:commandButton value="#{msg['button.back']}"
                                 action="back"
                                 process="@this"
                                 ajax="false"
                                 styleClass="ui-button-secondary"
                                 icon="pi pi-arrow-left">
                    <f:param name="projectId" value="#{reviewBean.projectId}" />
                </p:commandButton>

            </p:panel>
        </h:form>
    </h:body>
    </html>
</f:view>
